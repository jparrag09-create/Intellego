<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intellego! · Perfil de aprendizaje</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Mulish:wght@300;400;500;600;700&display=swap');
:root{--bg:#111e18;--surface:#1c2e23;--surface2:#243529;--surface3:#2c4033;--border:#375245;--border-light:#4a6e5a;--text:#e4ede8;--text-muted:#85a893;--text-dim:#4f6e5c;--accent:#4caf7a;--accent-dim:#1a3626;--accent-glow:rgba(76,175,122,.12);--accent-dark:#3d9468;--success:#4caf7a;--shadow:0 8px 40px rgba(0,0,0,.55)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Mulish",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(ellipse at 80% 5%,rgba(76,175,122,.07) 0%,transparent 45%),radial-gradient(ellipse at 5% 95%,rgba(201,168,76,.05) 0%,transparent 40%)}
nav{border-bottom:1px solid var(--border);padding:0 1.75rem;height:54px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,18,13,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}
.nav-logo img{height:30px;width:auto;object-fit:contain}
.nav-pill{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);border:1px solid var(--border);padding:.2rem .75rem;border-radius:20px}
main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:2.5rem 1rem 5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);max-width:620px;width:100%;overflow:hidden}
.card-progress{padding:1.25rem 2rem 0;display:none}
.prog-row{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-muted);font-weight:600;margin-bottom:.55rem;letter-spacing:.05em}
.prog-track{height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent-dark),var(--accent));border-radius:3px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.card-body{padding:2.25rem 2rem}
.intro-mascot{display:flex;justify-content:center;margin-bottom:1.5rem}
.intro-mascot img{height:110px;width:auto;filter:drop-shadow(0 4px 16px rgba(76,175,122,.25));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.intro-eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem;text-align:center}
.intro-title{font-family:"Libre Baskerville",serif;font-size:1.65rem;line-height:1.25;margin-bottom:.8rem;letter-spacing:-.01em;text-align:center}
.intro-desc{color:var(--text-muted);font-size:.9rem;line-height:1.7;margin-bottom:1.75rem;text-align:center}
.info-row{display:flex;justify-content:center;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap}
.info-item{display:flex;align-items:center;gap:.45rem;font-size:.8rem;color:var(--text-muted)}
.info-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}
.name-label{display:block;font-size:.75rem;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
.name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;font-family:"Mulish",sans-serif;font-size:.95rem;color:var(--text);margin-bottom:1.5rem;outline:none;transition:border-color .15s,background .15s}
.name-input::placeholder{color:var(--text-dim)}
.name-input:focus{border-color:var(--accent);background:var(--surface3)}
.q-tag{display:inline-flex;align-items:center;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:.2rem .65rem;border-radius:4px;margin-bottom:1rem}
.q-text{font-family:"Libre Baskerville",serif;font-size:1.08rem;line-height:1.55;margin-bottom:1.4rem;color:var(--text)}
.options{display:flex;flex-direction:column;gap:.5rem}
.option{display:flex;align-items:flex-start;gap:.75rem;padding:.8rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;font-family:"Mulish",sans-serif;font-size:.875rem;color:var(--text-muted);text-align:left;transition:all .15s;line-height:1.5}
.opt-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-light);flex-shrink:0;margin-top:1px;transition:all .15s;position:relative}
.option:hover{border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.option:hover .opt-radio{border-color:var(--accent)}
.option.sel{border-color:var(--accent);background:var(--accent-glow);color:var(--text)}
.option.sel .opt-radio{border-color:var(--accent);background:var(--accent)}
.option.sel .opt-radio::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--bg);border-radius:50%}
.btn-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.6rem}
.btn-back{background:none;border:none;color:var(--text-muted);font-family:"Mulish",sans-serif;font-size:.85rem;cursor:pointer;padding:.4rem 0;transition:color .15s}
.btn-back:hover{color:var(--text)}
.btn-primary{background:var(--accent);color:var(--bg);border:none;padding:.7rem 1.6rem;border-radius:8px;font-family:"Mulish",sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-primary:hover:not(:disabled){background:#5dcc91;transform:translateY(-1px);box-shadow:0 4px 16px rgba(76,175,122,.35)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-full{width:100%;padding:.85rem;font-size:.95rem}
.result{animation:slideUp .5s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.result-hero{background:linear-gradient(135deg,var(--bg) 0%,#142218 60%,#0e1a12 100%);border:1px solid var(--border);border-radius:10px;padding:1.75rem;margin-bottom:1.5rem;position:relative;overflow:hidden;display:flex;align-items:center;gap:1.25rem}
.result-hero::after{content:"";position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(76,175,122,.08),transparent 70%);border-radius:50%;pointer-events:none}
.result-mascot{height:70px;width:auto;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(76,175,122,.2))}
.result-hero-text{flex:1}
.result-eyebrow{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.35rem}
.result-name{font-family:"Libre Baskerville",serif;font-size:1.5rem;color:var(--text);margin-bottom:.2rem;letter-spacing:-.01em;line-height:1.2}
.result-sub{font-size:.88rem;color:var(--text-muted);font-style:italic}
.result-desc{font-size:.9rem;line-height:1.75;color:var(--text-muted);border-left:2px solid var(--accent);padding-left:1rem;margin-bottom:1.5rem}
.result-notice{font-size:.85rem;color:var(--text-muted);text-align:center;margin-bottom:1.25rem;line-height:1.6}
.btn-send{width:100%;background:var(--accent);color:var(--bg);border:none;padding:.85rem;border-radius:8px;font-family:"Mulish",sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:.75rem}
.btn-send:hover{background:#5dcc91;transform:translateY(-1px);box-shadow:0 4px 16px rgba(76,175,122,.3)}
.btn-restart{width:100%;background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:.75rem;border-radius:8px;font-family:"Mulish",sans-serif;font-size:.88rem;cursor:pointer;transition:all .15s}
.btn-restart:hover{border-color:var(--border-light);color:var(--text)}
@media(max-width:480px){.card-body{padding:1.5rem}.info-row{flex-direction:column;gap:.5rem;align-items:center}.result-hero{flex-direction:column;text-align:center}.result-mascot{height:60px}}
</style>
</head>

  {c:"Estilo cognitivo",q:"Cuando aprendes algo nuevo, ¿qué prefieres?",o:["Aprenderlo haciendo, aunque implique equivocarte en el proceso","Que alguien te lo explique con ejemplos concretos del mundo real","Leer e investigar por tu cuenta antes de ponerlo en práctica","Explorar libremente, sin estructura rígida"]},
  {c:"Toma de decisiones",q:"Tienes que tomar una decisión importante con información incompleta. ¿Qué haces?",o:["Confías en tu instinto y actúas","Consultas con personas de tu confianza antes de decidir","Buscas toda la información adicional que puedas antes de avanzar","Evalúas el peor escenario posible y actúas si es tolerable"]},
  {c:"Valores personales",q:"¿Cuál de estos valores describe mejor cómo te mueves por la vida?",o:["Valentía: prefieres actuar aunque tengas miedo","Lealtad: las personas en las que confías saben que siempre pueden contar contigo","Rigor: buscas entender en profundidad antes de opinar o actuar","Libertad: necesitas autonomía para dar lo mejor de ti"]},
  {c:"Relación con las normas",q:"Te piden que sigas un procedimiento que consideras ineficiente. ¿Qué haces?",o:["Lo sigues al pie de la letra: las normas están por algo","Lo sigues, pero propones mejoras por los canales adecuados","Lo adaptas discretamente a lo que crees más efectivo","Lo ignoras si estás convencido de que hay una forma mejor"]},
  {c:"Gestión del conflicto",q:"Surge un conflicto importante dentro de tu equipo. ¿Cuál es tu rol?",o:["Tomas partido por quien crees que tiene razón y lo defiendes","Medias entre las partes para encontrar un punto común","Analizas la situación desde fuera antes de involucrarte","Propones una solución creativa que nadie había contemplado"]},
  {c:"Energía y ritmo",q:"¿Cómo describes tu relación con el trabajo bajo presión?",o:["La presión te activa: rindes mejor cuando hay urgencia","La gestionas bien si tienes apoyo y no estás solo","Prefieres la planificación previa para evitar situaciones de presión","La usas como combustible para ideas que no te vendrían en calma"]},
  {c:"Perspectiva temporal",q:"Cuando afrontas un proyecto largo, ¿en qué te centras principalmente?",o:["En los hitos a corto plazo: avanzar paso a paso","En cómo afectará a las personas involucradas durante el proceso","En tener el plan completo antes de empezar","En el resultado final ideal, aunque el camino sea incierto"]},
  {c:"Liderazgo",q:"Si tuvieras que liderar un grupo, ¿cómo lo harías?",o:["Marcando el ritmo con el ejemplo y la acción","Escuchando a cada persona y sacando lo mejor de cada una","Estableciendo objetivos claros, procesos y responsabilidades","Inspirando con una visión que motive a todos"]},
  {c:"Curiosidad intelectual",q:"¿Qué tipo de conocimiento te atrae más?",o:["El conocimiento práctico: aprender a hacer cosas concretas","El conocimiento sobre las personas: psicología, relaciones, sociedad","El conocimiento riguroso: ciencias, sistemas, estructuras","El conocimiento especulativo: filosofía, arte, lo que aún no se sabe"]},
  {c:"Autopercepción",q:"Cuando te describes a ti mismo en un contexto nuevo, ¿qué destacarías?",o:["Tu capacidad para actuar con rapidez y decisión","Tu empatía y habilidad para conectar con los demás","Tu fiabilidad y rigor en todo lo que haces","Tu capacidad para sorprender e innovar"]}
];

// Perfiles visuales para el encuestado (sin D&D)
const PERFILES = [
  {nombre:"El Arquitecto Ágil", desc:"Combinas la acción con el pensamiento estratégico. Aprendes mejor cuando tienes margen para experimentar y corregir sobre la marcha. Tu mayor fortaleza es la capacidad de convertir la incertidumbre en oportunidad.", f:["Iniciativa","Adaptabilidad","Liderazgo situacional","Pensamiento ágil"]},
  {nombre:"El Conector Empático", desc:"Tu aprendizaje está profundamente ligado a las personas que te rodean. Procesas mejor en entornos colaborativos y encuentras motivación cuando tu trabajo tiene impacto humano directo.", f:["Inteligencia emocional","Colaboración","Comunicación","Cohesión de equipo"]},
  {nombre:"El Analista Metódico", desc:"Antes de actuar, comprendes. Tu proceso de aprendizaje es profundo y deliberado, lo que te convierte en una referencia de rigor dentro de cualquier equipo.", f:["Pensamiento crítico","Rigor","Planificación","Gestión del detalle"]},
  {nombre:"El Explorador Creativo", desc:"Aprendes a través de la exploración y la sorpresa. Los entornos rígidos te frenan, pero cuando tienes libertad, generas ideas que otros no ven.", f:["Creatividad","Pensamiento lateral","Autonomía","Innovación"]}
];

let step=0,userName="",answers=[],selected=null;
const $=id=>document.getElementById(id);

function render(){
  const ph=$("prog-header");
  if(step===0){ph.style.display="none";renderIntro();}
  else if(step>=1&&step<=QS.length){ph.style.display="block";updateProg();renderQ();}
  else if(step===QS.length+1){ph.style.display="none";renderResult();}
}

function updateProg(){
  const pct=Math.round(((step-1)/QS.length)*100);
  $("prog-label").textContent="Pregunta "+step+" de "+QS.length;
  $("prog-pct").textContent=pct+"%";
  $("prog-fill").style.width=pct+"%";
}

function renderIntro(){
  $("app").innerHTML=`
    <div style="display:flex;justify-content:center;margin-bottom:1.5rem">
      <img src="${MASCOTA}" style="height:110px;filter:drop-shadow(0 4px 16px rgba(76,175,122,.25));animation:float 3s ease-in-out infinite" alt="Intellego!"/>
    </div>
    <div style="font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem;text-align:center">Bienvenido a Intellego!</div>
    <div style="font-family:'Libre Baskerville',serif;font-size:1.65rem;line-height:1.25;margin-bottom:.8rem;letter-spacing:-.01em;text-align:center">Descubre tu perfil de aprendizaje</div>
    <p style="color:var(--text-muted);font-size:.9rem;line-height:1.7;margin-bottom:1.75rem;text-align:center">Intellego analiza tu forma de pensar, decidir y relacionarte para ayudarte a comprender cómo aprendes y en qué entornos desarrollas todo tu potencial.</p>
    <div class="info-row">
      <div class="info-item"><div class="info-dot"></div><span>15 preguntas · 4 min</span></div>
      <div class="info-item"><div class="info-dot"></div><span>Perfil personalizado al instante</span></div>
      <div class="info-item"><div class="info-dot"></div><span>Sin respuestas correctas</span></div>
    </div>
    <label class="name-label" for="ni">¿Cómo te llamas?</label>
    <input class="name-input" id="ni" type="text" placeholder="Tu nombre" autocomplete="off" oninput="$('sb').disabled=this.value.trim().length<2"/>
    <button class="btn-primary btn-full" id="sb" onclick="startQuiz()" disabled>Comenzar el perfil →</button>`;
}

function startQuiz(){userName=$("ni").value.trim();step=1;answers=[];selected=null;render();}

function renderQ(){
  const q=QS[step-1];
  $("app").innerHTML=`
    <div class="q-tag">${q.c}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${q.o.map((o,i)=>`<button class="option" onclick="selOpt(${i})"><div class="opt-radio"></div><span>${o}</span></button>`).join("")}</div>
    <div class="btn-row">
      <button class="btn-back" onclick="goBack()" ${step===1?"style='visibility:hidden'":""}>← Anterior</button>
      <button class="btn-primary" id="nb" onclick="nextStep()" disabled>${step<QS.length?"Siguiente →":"Ver mi perfil →"}</button>
    </div>`;
  if(answers[step-1]!==undefined)selOpt(answers[step-1]);
}

function selOpt(i){
  selected=i;
  document.querySelectorAll(".option").forEach((el,idx)=>el.classList.toggle("sel",idx===i));
  $("nb").disabled=false;
}

function goBack(){if(step<=1)return;step--;selected=answers[step-1]??null;render();}

function nextStep(){
  if(selected===null)return;
  answers[step-1]=selected;selected=null;step++;
  if(step>QS.length) render(); else render();
}

function getPerfilIdx(){
  // Cuenta qué opción eligió más veces (A=0,B=1,C=2,D=3)
  const count=[0,0,0,0];
  answers.forEach(a=>count[a]++);
  return count.indexOf(Math.max(...count));
}

function sendEmail(){
  const respuestas=answers.map((a,i)=>`${i+1}. [${QS[i].c}] ${QS[i].o[a]}`).join("%0D%0A");
  const subject=encodeURIComponent("[Intellego] Respuestas de "+userName);
  const body="NOMBRE: "+encodeURIComponent(userName)+"%0D%0A%0D%0A"+
    "RESPUESTAS:%0D%0A"+respuestas;
  window.location.href="mailto:"+DEST+"?subject="+subject+"&body="+body;
}

function renderResult(){
  const idx=getPerfilIdx();
  const p=PERFILES[idx];
  const iconos=["🎯","🧩","⚡","🔭"];
  $("app").innerHTML=`
    <div class="result">
      <div class="result-hero">
        <img class="result-mascot" src="${MASCOTA}" alt="Intellego!"/>
        <div class="result-hero-text">
          <div class="result-eyebrow">Tu perfil Intellego!</div>
          <div class="result-name">${p.nombre}</div>
          <div class="result-sub">Perfil personalizado · ${userName}</div>
        </div>
      </div>
      <div class="result-desc">${p.desc}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.5rem">
        ${p.f.map((f,i)=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.85rem"><div style="font-size:1rem;margin-bottom:.25rem">${iconos[i]}</div><div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:.12rem">Fortaleza ${i+1}</div><div style="font-size:.82rem;font-weight:600;color:var(--text)">${f}</div></div>`).join("")}
      </div>
      <p class="result-notice">Tu perfil ha sido registrado en Intellego!<br>Pulsa el botón para completar el proceso.</p>
      <button class="btn-send" onclick="sendEmail()">Enviar y finalizar ✓</button>
      <button class="btn-restart" onclick="restartAll()">Realizar el test de nuevo</button>
    </div>`;
}

function restartAll(){step=0;answers=[];selected=null;userName="";render();}
render();
</script>
</body>
</html>
